<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Precision Trader Pro</title>
    <meta name="description" content="Professional AI-powered forex trading platform" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300ff88'/><text y='.9em' font-size='80' x='10'>P</text></svg>" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #06061a; color: #ffffff; font-family: 'Courier New', monospace; }
      #root { height: 100vh; }
      #html-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #06061a;
        gap: 16px; z-index: 9999;
      }
      #html-loader .logo { font-size: 56px; color: #00ff88; font-weight: 900; letter-spacing: 4px; }
      #html-loader .title { font-size: 16px; color: #ffffff; letter-spacing: 4px; font-weight: 700; }
      #html-loader .sub { font-size: 11px; color: #cfcfe0; }
      #html-loader .dot {
        width: 10px; height: 10px; border-radius: 50%; background: #00ccff;
        animation: blink 1.2s infinite;
      }
      #html-loader .row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
      #html-loader .row span { font-size: 13px; color: #00ccff; letter-spacing: 2px; }
      #html-loader .progress { width: 180px; height: 2px; background: #111; border-radius: 2px; overflow: hidden; margin-top: 8px; }
      #html-loader .progress-bar { height: 100%; background: #00ff88; animation: load 30s linear forwards; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
      @keyframes load { from{width:0%} to{width:100%} }
    </style>
    <script type="module" crossorigin src="/assets/index-DNdlxmj5.js"></script>
  </head>
  <body>
    <div id="html-loader">
      <div class="logo">P</div>
      <div class="title">PRECISION TRADER PRO</div>
      <div class="row">
        <div class="dot"></div>
        <span id="loader-msg">Starting up...</span>
      </div>
      <div class="sub" id="loader-sub">Loading your keys and settings</div>
      <div class="progress"><div class="progress-bar"></div></div>
    </div>
    <div id="root"></div>
    <script>
      // Catch any JS errors and show them on screen so we can diagnose
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('loader-msg').textContent = 'JS Error';
        document.getElementById('loader-sub').textContent = (msg || '') + ' | ' + (src||'').split('/').pop() + ':' + line;
        document.getElementById('loader-sub').style.color = '#ff4466';
        document.getElementById('loader-sub').style.fontSize = '10px';
        document.getElementById('loader-sub').style.maxWidth = '80vw';
        document.getElementById('loader-sub').style.wordBreak = 'break-all';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('loader-msg').textContent = 'Load Error';
        document.getElementById('loader-sub').textContent = String(e.reason?.message || e.reason || 'unknown');
        document.getElementById('loader-sub').style.color = '#ff4466';
      });

      // Hide the HTML loader once React has mounted into #root
      const obs = new MutationObserver(() => {
        if (document.getElementById('root').children.length > 0) {
          const l = document.getElementById('html-loader');
          if (l) l.style.display = 'none';
          obs.disconnect();
        }
      });
      obs.observe(document.getElementById('root'), { childList: true });

      // If server is cold-starting, JS bundle hangs. Auto-reload after 30s so
      // the second request hits an awake server and loads instantly.
      setTimeout(() => {
        if (document.getElementById('root').children.length === 0) {
          document.getElementById('loader-msg').textContent = 'Waking server... reloading';
          document.getElementById('loader-sub').textContent = 'First visit takes ~30s on free hosting';
          setTimeout(() => window.location.reload(), 2000);
        }
      }, 30000);

      // Update message after 5s so user knows it's a cold start, not a crash
      setTimeout(() => {
        if (document.getElementById('root').children.length === 0) {
          document.getElementById('loader-msg').textContent = 'Waking up server...';
          document.getElementById('loader-sub').textContent = 'First visit takes ~30s — hang tight';
        }
      }, 5000);
    </script>
  </body>
</html>
