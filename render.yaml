services:
  - type: web
    name: precision-trader-pro
    runtime: node
    # Persistent disks require a paid instance type (free tier has no durable
    # storage — the container filesystem, and thus the SQLite DB, is wiped on
    # every restart/spin-down). Starter is the cheapest tier that supports a disk.
    plan: starter
    buildCommand: npm install && npm install --prefix client --include=dev && npm --prefix client run build
    startCommand: npm start
    healthCheckPath: /api/health
    # Persistent disk — survives restarts/deploys. db.js writes to DB_DIR.
    disk:
      name: ptp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Point the SQLite DB (and its backups/) at the persistent disk
      - key: DB_DIR
        value: /var/data
      - key: OANDA_API_KEY
        sync: false
      - key: OANDA_ACCOUNT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWELVE_DATA_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: METAAPI_TOKEN
        sync: false
      - key: METAAPI_ACCOUNT_ID
        sync: false
      - key: METAAPI_REGION
        sync: false
